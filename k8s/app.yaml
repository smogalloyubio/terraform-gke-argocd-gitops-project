apiVersion: apps/v1
kind: Deployment
metadata:
  name: simplebank-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simplebank-app
  template:
    metadata:
      labels:
        app: simplebank-app
    spec:
      containers:
        - name: simplebank-app
          image: simplebank-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: simplebank-app
spec:
  selector:
    app: simplebank-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
