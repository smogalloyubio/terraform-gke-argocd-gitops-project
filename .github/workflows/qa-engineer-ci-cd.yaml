name: QA Engineer CI/CD

on:
  push:
    branches: [ qa-engineer ]
  pull_request:
    branches: [ qa-engineer ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks (Docker)
        run: |
          echo "🔍 Running Gitleaks secret scan..."
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            zricethezav/gitleaks:latest \
            detect \
            --source=/repo \
            --redact \
            --verbose \
            --exit-code 1

      - name: Run Checkov Scan
        run: |
          echo "🛡️ Running Checkov scan on simplebank and Dockerfiles..."
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            bridgecrew/checkov \
            --directory /repo/simplebank \
            --check CKV_DOCKER_*
